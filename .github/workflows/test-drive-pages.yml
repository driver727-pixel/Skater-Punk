name: Build test drive package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - cursor/game-initial-files-ea73
    paths:
      - index.html
      - styles.css
      - app.js
      - .github/workflows/test-drive-pages.yml

permissions:
  contents: read

concurrency:
  group: test-drive-pages
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build self-contained test drive
        run: |
          mkdir -p _test_drive
          python3 - <<'PY'
          from pathlib import Path

          html = Path("index.html").read_text()
          css = Path("styles.css").read_text()
          js = Path("app.js").read_text()

          html = html.replace(
              '<link rel="stylesheet" href="styles.css" />',
              f"<style>\n{css}\n</style>",
          )
          html = html.replace(
              '<script src="app.js"></script>',
              f"<script>\n{js}\n</script>",
          )

          Path("_test_drive/test-drive.html").write_text(html)
          Path("_test_drive/index.html").write_text(Path("index.html").read_text())
          Path("_test_drive/styles.css").write_text(css)
          Path("_test_drive/app.js").write_text(js)
          PY

      - name: Create zip package
        run: |
          cd _test_drive
          zip -r ../skater-punk-test-drive.zip .

      - name: Upload test drive artifact
        uses: actions/upload-artifact@v4
        with:
          name: skater-punk-test-drive
          path: |
            _test_drive
            skater-punk-test-drive.zip

      - name: Publish run summary
        run: |
          {
            echo "## Test drive package ready"
            echo
            echo "Download the **skater-punk-test-drive** artifact from this run."
            echo
            echo "Then unzip it and open **test-drive.html** in your browser."
            echo
            echo "No local Python server or GitHub Pages setup is required."
          } >> "$GITHUB_STEP_SUMMARY"
