name: Deploy test drive

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - cursor/game-initial-files-ea73
    paths:
      - index.html
      - styles.css
      - app.js
      - .github/workflows/test-drive-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: test-drive-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Pages for workflow deployments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/pages" \
            -f build_type=workflow

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
